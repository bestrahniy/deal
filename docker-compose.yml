version: "3.8"
services:
  db:
    image: 'postgres:latest'
    container_name: deal_db
    environment:
      - 'POSTGRES_DB=deal_db'
      - 'POSTGRES_PASSWORD=071106ilya'
      - 'POSTGRES_USER=deal_user'

    ports:
      - '5432:5432'

    volumes:
      - db_data:/var/lib/postgresql/data
    
  app:
    image: deal-app:latest
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/deal_db
      SPRING_DATASOURCE_USERNAME: deal_user
      SPRING_DATASOURCE_PASSWORD: 071106ilya
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"

volumes:
  db_data:
  
